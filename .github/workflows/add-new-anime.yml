name: Add New Anime

on:
  workflow_dispatch:
    inputs:
      ids:
        description: "Space-separated MAL ids (optional)"
        type: string
        default: ""
      range:
        description: "Inclusive id range, e.g. 1-100 (optional)"
        type: string
        default: ""

concurrency:
  group: anime-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  add-anime:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch new anime
        env:
          DISCORD_WEBHOOK_URL: "${{ secrets.DISCORD_WEBHOOK_URL }}"
          IDS_INPUT: "${{ inputs.ids || '' }}"
          RANGE_INPUT: "${{ inputs.range || '' }}"
        run: |
          set -euo pipefail
          set -f

          if [ -z "$IDS_INPUT" ] && [ -z "$RANGE_INPUT" ]; then
            echo "::error::Provide either ids or range when running this workflow."
            exit 1
          fi

          ARGS=()

          if [ -n "$RANGE_INPUT" ]; then
            if ! [[ "$RANGE_INPUT" =~ ^[0-9]+-[0-9]+$ ]]; then
              echo "::error::range must look like 1-100."
              exit 1
            fi
            ARGS+=("--range=$RANGE_INPUT")
          fi

          if [ -n "$IDS_INPUT" ]; then
            if ! [[ "$IDS_INPUT" =~ ^[0-9]+([[:space:]]+[0-9]+)*$ ]]; then
              echo "::error::ids must be space-separated positive integers."
              exit 1
            fi
            read -r -a IDS <<< "$IDS_INPUT"
            ARGS+=("${IDS[@]}")
          fi

          node scripts/add-anime.js "${ARGS[@]}"

      - name: Commit and push safely
        run: |
          bash .github/scripts/commit-and-push.sh "chore(data): add new anime [skip ci]" rebuild-indexes
