name: Discover MAL IDs

on:
  schedule:
    - cron: "15 2 * * 0"
  workflow_dispatch:
    inputs:
      full:
        description: "Run a full discovery scan from page 1"
        type: boolean
        default: false
      max_pages:
        description: "Optional page cap for testing"
        type: string
        default: ""

concurrency:
  group: anime-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Discover ids
        env:
          FULL_INPUT: "${{ inputs.full || false }}"
          MAX_PAGES_INPUT: "${{ inputs.max_pages || '' }}"
        run: |
          set -euo pipefail

          ARGS=()

          if [ "$FULL_INPUT" = "true" ]; then
            ARGS+=("--full")
          fi

          if [ -n "$MAX_PAGES_INPUT" ]; then
            if ! [[ "$MAX_PAGES_INPUT" =~ ^[0-9]+$ ]] || [ "$MAX_PAGES_INPUT" -lt 1 ]; then
              echo "::error::max_pages must be a positive integer."
              exit 1
            fi
            ARGS+=("--max-pages=$MAX_PAGES_INPUT")
          fi

          node scripts/discover-ids.js "${ARGS[@]}"

      - name: Commit and push safely
        run: |
          bash .github/scripts/commit-and-push.sh "chore(data): discover MAL ids [skip ci]"
