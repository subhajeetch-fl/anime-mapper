name: Update Airing Anime

# Rate-limit strategy: runs every 4 hours and only touches anime that are
# "Currently Airing" (plus anything left in the retry queue from a prior
# failed run). It never re-crawls the whole 10,000+ entry catalog.
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-fetch even if recently updated'
        type: boolean
        default: false

# Prevent overlapping runs from racing on the same files/commits.
concurrency:
  group: anime-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # github-actions[bot] needs a real token with write access to push.
          # The default GITHUB_TOKEN is fine for same-repo pushes.
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run incremental update
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            node scripts/update-airing.js --force
          else
            node scripts/update-airing.js
          fi

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): update airing anime [skip ci]"
          git push
